name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Verify tag commit is on main
        working-directory: .
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Refusing to publish: tag commit is not on main"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm run typecheck

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF##*/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version v$PKG_VERSION"
            exit 1
          fi

      - name: Verify plugin versions match package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./plugins/grepmax/.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "plugin.json version ($PLUGIN_VERSION) != package.json ($PKG_VERSION)"
            echo "Run: bash scripts/sync-versions.sh"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$MARKET_VERSION" ]; then
            echo "marketplace.json version ($MARKET_VERSION) != package.json ($PKG_VERSION)"
            echo "Run: bash scripts/sync-versions.sh"
            exit 1
          fi

      - name: Build
        run: pnpm build

      # Audit the npm tarball to ensure no source code or internal files leak.
      #
      # Why this exists: In March 2025, a major project accidentally shipped
      # its entire internal source tree through npm because the package.json
      # "files" whitelist was too broad. Internal feature flags, security
      # architecture details, employee-only code paths, and A/B test
      # infrastructure were all publicly readable on the registry.
      #
      # Our "files" field in package.json whitelists: dist/, plugins/,
      # mlx-embed-server/, and scripts/postinstall.js. This step verifies
      # that ONLY those paths end up in the tarball. If something unexpected
      # appears — a src/ file, a .env, test fixtures, internal docs — this
      # fails the release before it reaches the registry.
      #
      # Run `npm pack --dry-run` locally to preview what would ship.
      - name: Audit npm tarball for source leaks
        run: |
          # Extract just the file paths from npm pack output (lines with a size like "8.2kB")
          FILES=$(npm pack --dry-run 2>&1 | sed -n 's/^npm notice [0-9][0-9.]*[kMG]*B[[:space:]]*//p')
          LEAKED=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            case "$FILE" in
              dist/*|plugins/*|mlx-embed-server/*|scripts/postinstall.js|package.json|README.md|LICENSE|NOTICE) ;;
              *) LEAKED="${LEAKED}  - ${FILE}\n" ;;
            esac
          done <<< "$FILES"
          if [ -n "$LEAKED" ]; then
            printf "ERROR: Unexpected files in npm tarball:\n%b" "$LEAKED"
            echo ""
            echo "If these files are intentional, add them to the case pattern"
            echo "in this workflow step and to \"files\" in package.json."
            exit 1
          fi
          echo "Tarball audit passed — no unexpected files."

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release (tag only, no assets)
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
